{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Add Multiple Time Slots - UCA Mental Health Services{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h2 class="card-title mb-0">Add Multiple Time Slots</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary">Add Time Slots</button>
                        <a href="{% url 'appointments:counselor_calendar' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
