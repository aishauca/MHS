{% extends 'base.html' %}

{% block title %}Calendar Test - UCA Mental Health Services{% endblock %}

{% block extra_css %}
<style>
    #calendar {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-4 text-center">Calendar Test</h1>
    
    <div id="calendar"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            slotMinTime: '09:00:00',
            slotMaxTime: '18:00:00',
            weekends: false
        });
        calendar.render();
    });
</script>
{% endblock %}
