{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Log In - UCA Mental Health Services{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h2 class="card-title mb-0">Log In</h2>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary">Log In</button>
                </form>
                <hr>
                <p>Don't have an account? <a href="{% url 'account_signup' %}">Sign up</a></p>
                <p><a href="{% url 'account_reset_password' %}">Forgot your password?</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
