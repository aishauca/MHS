{% extends 'base.html' %}

{% block title %}Password Reset Complete - UCA Mental Health Services{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3 mt-5">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h2 class="card-title mb-0">Password Reset Complete</h2>
                </div>
                <div class="card-body">
                    <div class="alert alert-success">
                        <p><strong>Your password has been set successfully!</strong></p>
                        <p>You may now log in with your new password.</p>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary">Log In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
