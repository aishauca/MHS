{% extends 'base.html' %}

{% block title %}Email Verified - UCA Mental Health Services{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3 mt-5">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h2 class="card-title mb-0">Email Verification Successful</h2>
                </div>
                <div class="card-body">
                    <div class="alert alert-success">
                        <h4 class="alert-heading">Your account has been verified!</h4>
                        <p>You can now log in to access all features of the UCA Mental Health Services platform.</p>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary">Log In Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
