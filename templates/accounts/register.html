
{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - UCA Mental Health Services{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h2 class="card-title mb-0">Sign Up</h2>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>
                <hr>
                <p>Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
