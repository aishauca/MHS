{% extends 'base.html' %}

{% block title %}Calendar Test - UCA Mental Health Services{% endblock %}

{% block extra_css %}
<style>
    #calendar {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-4 text-center">Calendar Test</h1>
    
    <div id="calendar"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Make sure FullCalendar is available
        if (typeof FullCalendar === 'undefined') {
            console.error('FullCalendar not loaded properly');
            return;
        }
        
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            slotMinTime: '09:00:00',
            slotMaxTime: '18:00:00',
            weekends: false,
            events: [
                {
                    title: 'Test Event',
                    start: '2025-04-08T10:00:00',
                    end: '2025-04-08T11:00:00'
                }
            ]
        });
        calendar.render();
    });
</script>
{% endblock %}
